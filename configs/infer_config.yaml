# =============================================================================
# configs/infer_config.yaml — Inference Configuration for GOOSE-M2F
# =============================================================================

# ── Paths ──────────────────────────────────────────────────────────────────
image_dir:        "/path/to/test/images"
csv_path:         "/path/to/goose_label_mapping.csv"
checkpoint_path:  "outputs/checkpoints/session_01/best_model.pth"
output_dir:       "outputs/predictions"

# ── Model ──────────────────────────────────────────────────────────────────
model_name:  "facebook/mask2former-swin-large-cityscapes-semantic"
num_classes: 64
num_queries: 200

# ── Inference Settings ─────────────────────────────────────────────────────
gpu_id:    0              # GPU index to use (0 or 1 for dual-GPU)
crop_h:    896            # Sliding window height
crop_w:    896            # Sliding window width
stride:    384            # Dense stride (57% overlap at 896x896)

# ── Test-Time Augmentation ─────────────────────────────────────────────────
# 4 scales × 2 flips = 8 augmented views per image
tta_scales: [0.5, 0.75, 1.0, 1.5]
